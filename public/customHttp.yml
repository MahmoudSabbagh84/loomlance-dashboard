customHeaders:
  - pattern: '**'
    headers:
      # Five always-safe security headers (never break a working app). CSP is deliberately
      # NOT here — it must be introduced Report-Only first and tested against Stripe/Supabase
      # traffic before enforcing (see docs/security-hardening-checklist in the splash repo).
      - key: 'Strict-Transport-Security'
        value: 'max-age=63072000; includeSubDomains; preload'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'X-Frame-Options'
        value: 'DENY'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
      - key: 'Permissions-Policy'
        value: 'camera=(), microphone=(), geolocation=()'
